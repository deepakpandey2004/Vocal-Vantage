# Render Blueprint — provisions the web service, Postgres and Redis together.
# Push this repo to GitHub, then in Render: New > Blueprint and point at the repo.
services:
  # ---- Web service ----
  - type: web
    name: vocal-vantage
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app.main:app -k uvicorn.workers.UvicornWorker -w 2 -b 0.0.0.0:$PORT --timeout 120"
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: AI_MOCK_MODE
        value: "false"        # set "true" to run without paid APIs
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false           # set manually in the Render dashboard
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: vocal-vantage-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: vocal-vantage-redis
          property: connectionString
      - key: REDIS_ENABLED
        value: "true"

  # ---- Redis (Key Value store) ----
  - type: redis
    name: vocal-vantage-redis
    plan: free
    ipAllowList: []           # only reachable from Render services

databases:
  # ---- PostgreSQL ----
  - name: vocal-vantage-db
    plan: free
    databaseName: vocal_vantage
    user: vocal_vantage
